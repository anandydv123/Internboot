<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Examination Portal</title>
    <script>
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(value) {
              currentFetch = value;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch:", e);
        }

        // Suppress benign Vite HMR WebSocket errors and unhandled rejections
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && (
            event.reason.message === 'WebSocket closed without opened.' ||
            (typeof event.reason === 'string' && event.reason.indexOf('WebSocket') !== -1)
          )) {
            event.preventDefault();
          }
        });

        window.addEventListener('error', function(event) {
          if (event.message && (
            event.message.indexOf('WebSocket') !== -1 ||
            event.message.indexOf('vite') !== -1
          )) {
            event.preventDefault();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
